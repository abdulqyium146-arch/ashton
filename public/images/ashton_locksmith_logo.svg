<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ab648;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9a28;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Green accent bar on left -->
  <rect x="0" y="0" width="8" height="200" rx="4" fill="url(#greenGrad)"/>

  <!-- Lock icon (circle + keyhole) -->
  <g transform="translate(42, 48)">
    <!-- Lock body -->
    <rect x="0" y="22" width="36" height="28" rx="4" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <!-- Lock shackle -->
    <path d="M7 22 L7 13 Q18 2 29 13 L29 22" fill="none" stroke="#7ab648" stroke-width="5" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="18" cy="33" r="5" fill="#1a1a1a"/>
    <rect x="15" y="35" width="6" height="8" rx="1" fill="#1a1a1a"/>
  </g>

  <!-- Company Name -->
  <text x="95" y="82" font-family="'Georgia', 'Times New Roman', serif" font-size="32" font-weight="bold" fill="white" filter="url(#shadow)">Ashton</text>
  <text x="95" y="108" font-family="'Georgia', 'Times New Roman', serif" font-size="18" font-weight="bold" fill="#7ab648" letter-spacing="1">LOCKSMITH</text>
  <text x="95" y="128" font-family="'Georgia', 'Times New Roman', serif" font-size="18" font-weight="bold" fill="#7ab648" letter-spacing="1">SERVICES</text>

  <!-- Divider line -->
  <line x1="95" y1="140" x2="370" y2="140" stroke="#7ab648" stroke-width="1.5" opacity="0.5"/>

  <!-- Phone number -->
  <text x="95" y="162" font-family="'Arial', sans-serif" font-size="15" fill="#cccccc" letter-spacing="1">📞 07713 341 666</text>

  <!-- Tagline -->
  <text x="95" y="182" font-family="'Arial', sans-serif" font-size="11" fill="#888888" font-style="italic" letter-spacing="0.5">Full Locksmith Services Available</text>

  <!-- Decorative key icon (top right) -->
  <g transform="translate(345, 30) rotate(45)">
    <rect x="0" y="-3" width="28" height="6" rx="3" fill="#7ab648" opacity="0.6"/>
    <circle cx="-6" cy="0" r="8" fill="none" stroke="#7ab648" stroke-width="4" opacity="0.6"/>
    <circle cx="-6" cy="0" r="4" fill="none" stroke="#7ab648" stroke-width="2" opacity="0.4"/>
    <rect x="14" y="-3" width="4" height="6" rx="1" fill="#1a1a1a"/>
    <rect x="20" y="-3" width="4" height="10" rx="1" fill="#7ab648" opacity="0.6"/>
  </g>
</svg>
